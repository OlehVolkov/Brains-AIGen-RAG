[ollama]
base_url = "http://127.0.0.1:11434"

[ollama.profiles.embeddings]
preferred_model = "bge-m3:latest"
fallback_models = ["bge-large:latest", "nomic-embed-text:latest", "e5-small:latest", "bge-small:latest"]

[ollama.profiles.lightweight]
preferred_model = "e5-small:latest"
fallback_models = ["nomic-embed-text:latest", "bge-small:latest", "bge-large:latest", "bge-m3:latest"]

[ollama.profiles.multilingual]
preferred_model = "bge-m3:latest"
fallback_models = ["bge-large:latest", "e5-small:latest", "bge-small:latest"]

[ollama.profiles.reranker]
preferred_model = "qllama/bge-reranker-large:q8_0"
fallback_models = []

[reranker]
cross_encoder_model = "BAAI/bge-reranker-large"

[pdf]
pdf_dir = "PDF"
fetch_note_globs = ["EN/Literature and Priorities.md", "UA/Література та пріоритети.md"]
index_root = ".brains/.index/pdf_search"
table_name = "scientific_pdf_chunks"

[vault]
index_root = ".brains/.index/vault_search"
table_name = "vault_markdown_chunks"

[graph]
index_root = ".brains/.index/graph_search"
graph_file = "graph.json"
governance_files = [
  "AGENTS.md",
  "README.md",
  "NOTICE.md",
  "AUDIT.md",
  "Home.md",
  "Index.md",
  "Індекс.md",
  "Головна.md",
  "Literature and Priorities.md",
  "Література та пріоритети.md",
]
special_page_pairs = [
  ["Home.md", "UA/Головна.md"],
  ["EN/Index.md", "UA/Індекс.md"],
  ["EN/Literature and Priorities.md", "UA/Література та пріоритети.md"],
  ["README.md", "UA/README.md"],
  ["AGENTS.md", "UA/AGENTS.md"],
  ["NOTICE.md", "UA/NOTICE.md"],
]

[health]
pdf_probe_query = "pairformer"
vault_probe_query = "pairformer"

[research]
index_root = ".brains/.index/research"
vault_k = 5
pdf_k = 5
memory_k = 3
